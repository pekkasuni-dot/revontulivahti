name: Päivitä pilvidata

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pilvidata
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hae pilviruudukko Open-Meteosta
        run: node scripts/fetch-clouds.mjs

      - name: Committaa jos data muuttui
        run: |
          git config user.name "pilvibotti"
          git config user.email "actions@users.noreply.github.com"
          git add data/clouds.json
          if git diff --cached --quiet; then
            echo "Ei muutoksia."
          else
            git commit -m "Pilvidata $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
