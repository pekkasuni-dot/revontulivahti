name: Päivitä pilvidata

on:
  schedule:
    - cron: '12 1,7,13,19 * * *'   # 4× vrk ECMWF-malliajojen jälkeen (01, 07, 13, 19 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pilvidata
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Asenna Python-riippuvuudet
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libeccodes-dev
          pip install ecmwf-opendata cfgrib xarray numpy

      - name: Hae pilviruudukko ECMWF:ltä
        run: python scripts/fetch-clouds.py

      - name: Committaa jos data muuttui
        run: |
          git config user.name "pilvibotti"
          git config user.email "actions@users.noreply.github.com"
          git add data/clouds.json
          if git diff --cached --quiet; then
            echo "Ei muutoksia."
          else
            git commit -m "Pilvidata $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
