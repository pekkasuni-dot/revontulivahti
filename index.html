<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060B14">
<title>Revontulivahti</title>
<meta name="description" content="Näenkö revontulet tästä pisteestä tänä yönä? Revontuliennuste, pilvisyys ja pimeys yhdessä kartassa.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#060B14;        /* polar night sky */
    --panel:#0C1524;        /* raised surface */
    --line:#1B2A40;         /* hairline */
    --ink:#E8F0F8;          /* primary text */
    --dim:#8CA0B8;          /* secondary text */
    --aurora:#53E6A6;       /* aurora green */
    --aurora-hi:#8CF5C8;
    --violet:#8B7BF7;       /* upper-arc violet */
    --cloud:#E0B04E;        /* cloud warning amber */
    --bad:#E06060;
    --radius:18px;
    --font-display:'Sora',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    background:var(--night);
    color:var(--ink);
    overflow:hidden;
  }
  #map{position:fixed;inset:0;background:var(--night)}
  .maplibregl-ctrl-attrib{font-size:10px;background:rgba(6,11,20,.7)!important;color:var(--dim)}
  .maplibregl-ctrl-attrib a{color:var(--dim)}

  /* ── top bar ─────────────────────────── */
  header{
    position:fixed;top:0;left:0;right:0;z-index:20;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,rgba(6,11,20,.92) 0%,rgba(6,11,20,0) 100%);
    pointer-events:none;
  }
  header .logo{
    width:30px;height:30px;flex:none;
  }
  header h1{
    font-family:var(--font-display);
    font-size:17px;font-weight:700;letter-spacing:.01em;
  }
  header .kp{
    margin-left:auto;pointer-events:auto;
    font-family:var(--font-display);font-weight:600;font-size:13px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;color:var(--dim);
  }
  header .kp b{color:var(--ink);font-weight:700}

  /* ── locate button ───────────────────── */
  #locateBtn{
    position:fixed;right:14px;z-index:20;
    bottom:calc(env(safe-area-inset-bottom) + 292px);
    width:46px;height:46px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line);
    color:var(--aurora);font-size:20px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45);
    transition:transform .15s;
  }
  #locateBtn:active{transform:scale(.92)}
  #locateBtn:focus-visible{outline:2px solid var(--aurora);outline-offset:2px}
  #cloudBtn{
    position:fixed;right:14px;z-index:20;
    bottom:calc(env(safe-area-inset-bottom) + 350px);
    width:46px;height:46px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line);
    color:var(--cloud);font-size:20px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45);
    transition:transform .15s,opacity .2s;
  }
  #cloudBtn:active{transform:scale(.92)}
  #cloudBtn:focus-visible{outline:2px solid var(--cloud);outline-offset:2px}
  #updatePill{
    display:none;position:fixed;top:calc(env(safe-area-inset-top) + 58px);
    left:50%;transform:translateX(-50%);z-index:45;
    background:var(--aurora);color:#06281A;border:0;border-radius:999px;
    font-family:var(--font-display);font-weight:600;font-size:13px;
    padding:9px 16px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  #updatePill.show{display:block}

  /* ── bottom sheet ────────────────────── */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:var(--panel);
    border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;
    padding:14px 18px calc(env(safe-area-inset-bottom) + 16px);
    box-shadow:0 -10px 40px rgba(0,0,0,.5);
  }
  .sheet-toggle{display:block;width:100%;background:none;border:0;padding:4px 0 12px;cursor:pointer}
  .sheet-toggle:focus-visible{outline:2px solid var(--aurora);outline-offset:2px;border-radius:6px}
  .sheet-grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto}
  #sheet.min .factors, #sheet.min .timectl, #sheet.min .note,
  #sheet.min .verdict p, #sheet.min .verdict .place,
  #sheet.min .ver{display:none}
  #sheet.min{padding-bottom:calc(env(safe-area-inset-bottom) + 10px)}
  #sheet.min .row{gap:12px}
  #sheet.min .gauge{width:56px;height:56px}
  #sheet.min .gauge circle{stroke-width:12}
  #sheet.min .gauge .num b{font-size:14px}
  #sheet.min .gauge .num span{display:none}
  #sheet.min .verdict h2{font-size:15px;margin:0}

  .row{display:flex;align-items:center;gap:16px}

  /* gauge — the signature element */
  .gauge{position:relative;width:118px;height:118px;flex:none}
  .gauge svg{width:100%;height:100%;transform:rotate(-90deg)}
  .gauge circle{fill:none;stroke-width:9;stroke-linecap:round}
  .gauge .track{stroke:var(--line)}
  .gauge .val{stroke:var(--aurora);transition:stroke-dashoffset .6s ease, stroke .3s}
  .gauge .num{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .gauge .num b{font-family:var(--font-display);font-size:30px;font-weight:700;line-height:1}
  .gauge .num span{font-size:10.5px;color:var(--dim);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}

  .verdict{flex:1;min-width:0}
  .verdict h2{font-family:var(--font-display);font-size:19px;font-weight:600;line-height:1.25;margin-bottom:4px}
  .verdict p{font-size:13px;color:var(--dim);line-height:1.45}
  .verdict .place{font-size:12px;color:var(--dim);margin-top:6px;display:flex;align-items:center;gap:5px}
  .verdict .place svg{flex:none}

  /* factor chips */
  .factors{display:flex;gap:8px;margin-top:14px}
  .chip{
    flex:1;background:var(--night);border:1px solid var(--line);
    border-radius:var(--radius);padding:9px 10px 8px;
  }
  .chip small{display:block;font-size:10.5px;color:var(--dim);letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
  .chip b{font-family:var(--font-display);font-size:16px;font-weight:600}
  .chip .bar{height:3px;border-radius:2px;background:var(--line);margin-top:7px;overflow:hidden}
  .chip .bar i{display:block;height:100%;border-radius:2px;background:var(--aurora);transition:width .5s ease}
  .chip.c-cloud .bar i{background:var(--cloud)}
  .chip.c-dark .bar i{background:var(--violet)}

  /* time slider */
  .timectl{margin-top:14px}
  .timectl .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
  .timectl .lbl b{color:var(--ink);font-weight:600}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:26px;background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:var(--line)}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--aurora);border:3px solid var(--night);margin-top:-8.5px;
    box-shadow:0 2px 8px rgba(0,0,0,.5);
  }
  input[type=range]::-moz-range-track{height:5px;border-radius:3px;background:var(--line)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--aurora);border:3px solid var(--night)}
  input[type=range]:focus-visible{outline:2px solid var(--aurora);outline-offset:4px;border-radius:6px}

  .note{margin-top:10px;font-size:11.5px;color:var(--dim);line-height:1.4;display:none}
  .note.show{display:block}
  .note.err{color:var(--bad)}
  .ver{margin-top:8px;text-align:right;font-size:10px;color:var(--dim);opacity:.45}

  /* toast for load state */
  #toast{
    position:fixed;top:calc(env(safe-area-inset-top) + 58px);left:50%;transform:translateX(-50%);
    z-index:40;background:var(--panel);border:1px solid var(--line);color:var(--dim);
    font-size:12.5px;padding:8px 14px;border-radius:999px;transition:opacity .4s;white-space:nowrap;
  }
  #toast.hide{opacity:0;pointer-events:none}

  @media (max-width:420px){
    #sheet{padding:8px 14px calc(env(safe-area-inset-bottom) + 12px)}
    .row{gap:12px}
    .gauge{width:92px;height:92px}
    .gauge .num b{font-size:22px}
    .verdict h2{font-size:16px}
    .verdict p{font-size:12px;line-height:1.4}
    .chip{padding:7px 8px 6px}
    .chip b{font-size:14px}
    .factors,.timectl{margin-top:10px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
  @media (min-width:700px){
    #sheet{left:auto;right:20px;bottom:20px;width:400px;border-radius:22px;border:1px solid var(--line)}
    #locateBtn{bottom:auto;top:calc(env(safe-area-inset-top) + 70px)}
    #cloudBtn{bottom:auto;top:calc(env(safe-area-inset-top) + 128px)}
  }
</style>
</head>
<body>

<div id="map" role="application" aria-label="Revontulikartta"></div>

<header>
  <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
    <rect width="32" height="32" rx="8" fill="#0C1524"/>
    <path d="M6 22 C10 12, 12 20, 16 10 C20 20, 22 12, 26 22" fill="none" stroke="#53E6A6" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="25" cy="7.5" r="1.6" fill="#8B7BF7"/>
  </svg>
  <h1>Revontulivahti</h1>
  <div class="kp" id="kpBadge">Kp <b>–</b></div>
</header>

<button id="locateBtn" aria-label="Näytä oma sijainti">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
    <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
  </svg>
</button>

<button id="cloudBtn" aria-label="Pilvikerros päälle tai pois" aria-pressed="true">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M7 17h9a4 4 0 0 0 .7-7.94A5.5 5.5 0 0 0 6 8.6 3.7 3.7 0 0 0 7 17z"/>
  </svg>
</button>

<button id="updatePill">Uusi versio saatavilla — päivitä</button>

<div id="toast">Haetaan revontuli- ja säätietoja…</div>

<section id="sheet" aria-live="polite">
  <button class="sheet-toggle" id="sheetToggle" aria-expanded="true" aria-label="Pienennä tai laajenna tietopaneeli">
    <div class="sheet-grip" aria-hidden="true"></div>
  </button>

  <div class="row">
    <div class="gauge" aria-hidden="true">
      <svg viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="52"/>
        <circle class="val" id="gaugeVal" cx="60" cy="60" r="52"
                stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="num"><b id="idxNum">–</b><span>näkyvyys</span></div>
    </div>
    <div class="verdict">
      <h2 id="verdictTitle">Valitse piste kartalta</h2>
      <p id="verdictText">Napauta karttaa tai käytä paikannusta, niin lasken revontulien näkyvyyden juuri siihen pisteeseen.</p>
      <div class="place" id="placeLbl"></div>
    </div>
  </div>

  <div class="factors">
    <div class="chip c-aurora">
      <small>Revontulet</small><b id="fAurora">–</b>
      <div class="bar"><i id="bAurora" style="width:0%"></i></div>
    </div>
    <div class="chip c-cloud">
      <small>Pilvetön taivas</small><b id="fCloud">–</b>
      <div class="bar"><i id="bCloud" style="width:0%"></i></div>
    </div>
    <div class="chip c-dark">
      <small>Pimeys</small><b id="fDark">–</b>
      <div class="bar"><i id="bDark" style="width:0%"></i></div>
    </div>
  </div>

  <div class="timectl">
    <div class="lbl"><span>Ajankohta</span><b id="timeLbl">Nyt</b></div>
    <input type="range" id="timeSlider" min="0" max="36" step="1" value="0"
           aria-label="Ennusteen ajankohta, tunteja tästä hetkestä">
  </div>

  <p class="note" id="noteMsg"></p>
  <p class="ver" id="appVersion"></p>
</section>

<canvas id="cloudCanvas" width="960" height="640" style="display:none" aria-hidden="true"></canvas>

<script>
'use strict';
/* ══════════════════════════════════════════════════════════════
   Revontulivahti — MVP
   Data:  NOAA SWPC OVATION (revontuliovaali, nowcast)
          NOAA SWPC Kp-indeksi + 3 vrk ennuste
          Open-Meteo (pilvisyys kerroksittain, tunneittain)
   Laskenta selaimessa: auringon korkeus (pimeys), geomagneettinen
   leveysaste, näkyvyysindeksi.
   ══════════════════════════════════════════════════════════════ */

const APP_VERSION = 'v1.14';  // päivitä joka julkaisun yhteydessä
const $ = id => document.getElementById(id);
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
const state = {
  point:null,          // {lat,lon}
  hour:0,              // slider offset in hours
  ovation:null,        // {grid: Float32Array[181*360], time}
  kpNow:null,
  kpForecast:[],       // [{t:Date, kp}]
  clouds:null,         // {times:[Date], low:[], mid:[], high:[], total:[]}
  marker:null,
  cloudGrid:null,      // {lats,lons,times,vals}
  cloudsOn:true,
};

/* ── kirjastojen lataus varmistuksin ─────────────────────────── */
function loadOne(tag, attrs){
  return new Promise(res=>{
    const el = document.createElement(tag);
    Object.assign(el, attrs);
    el.onload = ()=>res(true);
    el.onerror = ()=>res(false);
    document.head.appendChild(el);
  });
}
async function loadMapLib(){
  const v='3.6.2';
  const cdns=[
    ['https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/'+v+'/maplibre-gl.min.js',
     'https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/'+v+'/maplibre-gl.min.css'],
    ['https://unpkg.com/maplibre-gl@'+v+'/dist/maplibre-gl.js',
     'https://unpkg.com/maplibre-gl@'+v+'/dist/maplibre-gl.css'],
    ['https://cdn.jsdelivr.net/npm/maplibre-gl@'+v+'/dist/maplibre-gl.min.js',
     'https://cdn.jsdelivr.net/npm/maplibre-gl@'+v+'/dist/maplibre-gl.min.css']
  ];
  for(const [js,css] of cdns){
    if(await loadOne('script',{src:js})){
      loadOne('link',{rel:'stylesheet',href:css});
      return true;
    }
  }
  return false;
}

/* ── kartta ──────────────────────────────────────────────────── */
let map = null;
let tileFallbackDone = false;

function mapStyle(dark){
  return {
    version:8,
    sources:{ base:{
      type:'raster',
      tiles: dark
        ? ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
           'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png']
        : ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
      tileSize:256,
      attribution:'© OpenStreetMap' + (dark?' © CARTO':'') + ' · Revontulet: NOAA SWPC · Sää: Open-Meteo'
    }},
    layers:[{id:'base',type:'raster',source:'base'}]
  };
}

function initMap(){
  try{
    map = new maplibregl.Map({
      container:'map',
      style:mapStyle(true),
      center:[25.5,64.9],
      zoom:4.6
    });
    map.on('click', e=> setPoint(e.lngLat.lat, e.lngLat.lng, 'Valittu piste'));
    // Jos tumma taustakartta on estetty, vaihda OSM:n vakiotiiliin
    map.on('error', ev=>{
      const msg = (ev && ev.error && ev.error.message) || '';
      if(!tileFallbackDone && (msg.includes('cartocdn') || (ev.sourceId==='base'))){
        tileFallbackDone = true;
        map.setStyle(mapStyle(false));
        map.on('style.load', ()=>{ if(state.ovation) drawOvalOverlay(); if(state.cloudGrid) renderClouds(); });
        note('Tumma taustakartta ei latautunut — käytetään OpenStreetMapin vakiokarttaa.');
      }
    });
    return true;
  }catch(e){
    console.warn('map init failed', e);
    map = null;
    return false;
  }
}

$('locateBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){ note('Paikannus ei ole käytettävissä tässä selaimessa.', true); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{
      setPoint(p.coords.latitude, p.coords.longitude, 'Oma sijainti');
      if(map) map.flyTo({center:[p.coords.longitude,p.coords.latitude], zoom:7});
    },
    ()=>note('Paikannus epäonnistui — tarkista sijaintilupa.', true)
  );
});

/* ── datahaut ────────────────────────────────────────────────── */
async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(url+' → '+r.status);
  return r.json();
}

async function loadOvation(){
  const d = await fetchJSON('https://services.swpc.noaa.gov/json/ovation_aurora_latest.json');
  // coordinates: [lon 0..359, lat -90..90, aurora prob 0..100]
  const grid = new Float32Array(181*360);
  for(const [lon,lat,p] of d.coordinates){
    grid[(lat+90)*360 + lon] = p;
  }
  state.ovation = {grid, time:new Date(d['Forecast Time']||d['Observation Time']||Date.now())};
  drawOvalOverlay();
}

async function loadKp(){
  // nykyarvo
  try{
    const rows = await fetchJSON('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json');
    const last = rows[rows.length-1];
    // poimi rivin ensimmainen kelvollinen lukuarvo (sarakejarjestys vaihtelee)
    const num = last.slice(1).map(parseFloat).find(Number.isFinite);
    if(Number.isFinite(num)) state.kpNow = num;
  }catch(e){ console.warn(e); }
  // ennuste
  try{
    const rows = await fetchJSON('https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json');
    state.kpForecast = rows.slice(1)
      .map(r=>({t:new Date(r[0].replace(' ','T')+'Z'), kp:parseFloat(r[1])}))
      .filter(f=>Number.isFinite(f.kp) && !isNaN(f.t));
  }catch(e){ console.warn(e); }
  if(Number.isFinite(state.kpNow)) $('kpBadge').innerHTML = 'Kp <b>'+state.kpNow.toFixed(1)+'</b>';
}

async function loadClouds(lat,lon){
  const url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat.toFixed(3)
    +'&longitude='+lon.toFixed(3)
    +'&hourly=cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high'
    +'&forecast_days=3&timezone=UTC';
  const d = await fetchJSON(url);
  state.clouds = {
    times: d.hourly.time.map(t=>new Date(t+'Z')),
    total: d.hourly.cloud_cover,
    low:   d.hourly.cloud_cover_low,
    mid:   d.hourly.cloud_cover_mid,
    high:  d.hourly.cloud_cover_high
  };
}

/* ── ovaalin piirto kartalle ─────────────────────────────────── */
function drawOvalOverlay(){
  if(!state.ovation || !map) return;
  const W=720, H=340;                       // 2px/deg lon, lat 85N..85S
  const cv = document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(W,H);
  for(let y=0;y<H;y++){
    const lat = 85 - (y/H)*170;
    const latIdx = clamp(Math.round(lat+90),0,180);
    for(let x=0;x<W;x++){
      let lon = (x/W)*360 - 180;            // -180..180
      let lonIdx = Math.round((lon+360)%360);
      const p = state.ovation.grid[latIdx*360 + lonIdx] || 0;
      const i = (y*W+x)*4;
      if(p>1){
        // green→violet ramp by intensity
        const t = clamp(p/100,0,1);
        img.data[i]   = Math.round(0x53 + (0x8B-0x53)*t*0.7);
        img.data[i+1] = Math.round(0xE6 - (0xE6-0x7B)*t*0.55);
        img.data[i+2] = Math.round(0xA6 + (0xF7-0xA6)*t*0.7);
        img.data[i+3] = Math.round(clamp(p*3.2, 0, 200));
      }
    }
  }
  ctx.putImageData(img,0,0);
  const url = cv.toDataURL();
  const coords = [[-180,85],[180,85],[180,-85],[-180,-85]];
  const add = ()=>{
    if(map.getSource('ovation')){
      map.getSource('ovation').updateImage({url, coordinates:coords});
    }else{
      map.addSource('ovation',{type:'image',url,coordinates:coords});
      map.addLayer({id:'ovation',type:'raster',source:'ovation',
                    paint:{'raster-opacity':0.85,'raster-resampling':'linear'}});
      if(map.getLayer('clouds')) map.moveLayer('clouds','ovation');
    }
  };
  map.loaded() ? add() : map.on('load', add);
}

/* ── pilviruudukko koko kartalle (Open-Meteo) ────────────────── */
const CG = { lat0:47, lat1:72, lon0:-15, lon1:45, nlat:26, nlon:31 };
CG.dlat = (CG.lat1-CG.lat0)/(CG.nlat-1);
CG.dlon = (CG.lon1-CG.lon0)/(CG.nlon-1);
CG.lats = Array.from({length:CG.nlat}, (_,i)=>CG.lat0 + i*CG.dlat);
CG.lons = Array.from({length:CG.nlon}, (_,i)=>CG.lon0 + i*CG.dlon);

const sleep = ms => new Promise(r=>setTimeout(r,ms));
const CLOUD_CACHE_KEY = 'rv-cloudgrid-v2';

function saveCloudCache(times, vals, nlat, nlon){
  try{
    localStorage.setItem(CLOUD_CACHE_KEY, JSON.stringify({
      t: Date.now(),
      times: Array.from(times, t => t instanceof Date ? t.getTime() : t),
      vals: Array.from(vals),
      nlat, nlon
    }));
  }catch(e){}
}

function applyStaticGrid(d){
  const times = d.times.map(t=>new Date(t));
  const vals = new Float32Array(d.vals.length);
  for(let i=0;i<d.vals.length;i++) vals[i] = d.vals[i]/100;
  state.cloudGrid = {times, vals, nlat:d.nlat, nlon:d.nlon};
  renderClouds();
  saveCloudCache(times, vals, d.nlat, d.nlon);
}

/* Ensisijainen lahde: Actions-putken tuottama staattinen tiedosto samasta
   reposta (ei kuormarajoja, ei CORS-huolia). Suora Open-Meteo on varapolku. */
async function loadCloudGrid(){
  let staticData = null;
  try{
    const d = await fetchJSON('data/clouds.json?v=' + Math.floor(Date.now()/600e3));
    if(d && d.nlat===CG.nlat && d.nlon===CG.nlon && Array.isArray(d.vals)) staticData = d;
  }catch(e){ /* tiedostoa ei viela ole tai verkko pati — jatketaan suoraan hakuun */ }

  if(staticData && Date.now()-staticData.generated < 3*3600e3){
    applyStaticGrid(staticData);            // tuore putkidata: valmis
    return;
  }
  try{
    await loadCloudGridDirect();            // putki puuttuu tai on vanha → suora haku
  }catch(e){
    if(staticData && Date.now()-staticData.generated < 12*3600e3){
      applyStaticGrid(staticData);          // vanhahko putkidata on parempi kuin ei mitaan
      return;
    }
    throw e;
  }
}

async function loadCloudGridDirect(){
  const pts = [];
  for(const la of CG.lats) for(const lo of CG.lons) pts.push([la,lo]);
  const chunks = [];
  for(let i=0;i<pts.length;i+=70) chunks.push(pts.slice(i,i+70));
  let times = null;
  const nlat = CG.lats.length, nlon = CG.lons.length;
  let vals = null;
  let off = 0;
  for(const ch of chunks){
    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + ch.map(p=>p[0].toFixed(2)).join(',')
      + '&longitude='+ ch.map(p=>p[1].toFixed(2)).join(',')
      + '&hourly=cloud_cover&forecast_days=2&timezone=UTC';  // 48 h riittaa, puolet halvempi
    let res = null;
    for(let attempt=0; attempt<3; attempt++){
      try{ res = await fetchJSON(url); break; }
      catch(e){
        if(attempt===2) throw e;                 // kolmas hylkays kaataa koko haun
        await sleep(8000*(attempt+1));           // 429-tyylinen ruuhka: odota ja yrita uudelleen
      }
    }
    if(!Array.isArray(res)) res = [res];
    if(!times){
      times = res[0].hourly.time.map(t=>new Date(t+'Z'));
      vals = new Float32Array(times.length * nlat * nlon);
    }
    res.forEach((loc,j)=>{
      const p = off + j;                 // point index in row-major lats×lons
      const r = Math.floor(p / nlon), c = p % nlon;
      const cc = loc.hourly.cloud_cover;
      for(let t=0;t<times.length;t++){
        vals[t*nlat*nlon + r*nlon + c] = (cc[t] ?? 0)/100;
      }
    });
    off += ch.length;
    // osittainen piirtyminen: nayta se mika on jo saatu
    state.cloudGrid = {times, vals, nlat, nlon};
    renderClouds();
    await sleep(300);                            // pieni tauko erien valiin keventaa ruuhkaa
  }
  saveCloudCache(times, vals, nlat, nlon);
}

function loadCloudCache(){
  try{
    const d = JSON.parse(localStorage.getItem(CLOUD_CACHE_KEY));
    if(!d || Date.now()-d.t > 12*3600e3) return false;   // yli 12 h vanha ei kelpaa
    state.cloudGrid = {times:d.times.map(t=>new Date(t)),
                       vals:new Float32Array(d.vals), nlat:d.nlat, nlon:d.nlon};
    renderClouds();
    return Math.max(0.05, (Date.now()-d.t)/3600e3);   // ika tunteina (aina truthy)
  }catch(e){ return false; }
}

/* 429-toipuminen: yrita tuoretta hakua taustalla kasvavalla valilla */
let cloudRetryDelay = 2*60*1000;
let cloudRetryTimer = null;
function scheduleCloudRetry(){
  if(cloudRetryTimer) return;
  cloudRetryTimer = setTimeout(()=>{
    cloudRetryTimer = null;
    loadCloudGrid().then(()=>{ renderClouds(); note(''); cloudRetryDelay = 2*60*1000; })
      .catch(()=>{ cloudRetryDelay = Math.min(cloudRetryDelay*2, 30*60*1000); scheduleCloudRetry(); });
  }, cloudRetryDelay);
}

const merc  = lat => Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360));
const imerc = y   => (2*Math.atan(Math.exp(y)) - Math.PI/2) * 180/Math.PI;
const ss    = t   => t*t*(3-2*t);   // smoothstep: poistaa bilineaarisen ristikkojaljen

/* Saumattomasti toistuva fraktaalikohina pilvitekstuuriin (lasketaan kerran).
   Tekstuuri on kosmeettinen: pilvien sijainti ja reunat tulevat datasta. */
const NOISE = (()=>{
  const S = 512, n = new Float32Array(S*S);
  const h = (x,y)=>{ let t=(x*374761393 + y*668265263)|0;
    t=((t^(t>>13))*1274126177)|0; return ((t^(t>>16))>>>0)/4294967295; };
  const sm = (a,b,t)=>a+(b-a)*(t*t*(3-2*t));
  let amp=0.55, freq=8;
  for(let oct=0; oct<3; oct++, amp*=0.5, freq*=2){
    for(let y=0;y<S;y++){
      const fy=y/S*freq, y0=Math.floor(fy), ty=fy-y0, y1=(y0+1)%freq;
      for(let x=0;x<S;x++){
        const fx=x/S*freq, x0=Math.floor(fx), tx=fx-x0, x1=(x0+1)%freq;
        const v = sm( sm(h(x0,y0),h(x1,y0),tx), sm(h(x0,y1),h(x1,y1),tx), ty );
        n[y*S+x] += (v-0.5)*amp;
      }
    }
  }
  return {S, n};
})();

function cloudTimeFloat(date){
  const ts = state.cloudGrid.times;           // hilan aika-askel on 1 h
  return clamp((date - ts[0]) / 3600e3, 0, ts.length - 1.0001);
}

function renderClouds(){
  if(!state.cloudGrid || !map) return;
  if(!map.loaded()){ map.once('load', ()=>renderClouds()); return; }
  const g = state.cloudGrid;
  const N = g.nlat * g.nlon;

  // ajallinen sekoitus: liukuma kahden ennustetunnin valilla → sulava animaatio
  const tf = cloudTimeFloat(new Date(Date.now() + state.hour*3600e3));
  const t0 = Math.floor(tf), ta = tf - t0;
  if(!renderClouds._B) renderClouds._B = new Float32Array(N);
  const B = renderClouds._B;
  const b0 = t0*N, b1 = Math.min(t0+1, g.times.length-1)*N;
  for(let i=0;i<N;i++) B[i] = g.vals[b0+i]*(1-ta) + g.vals[b1+i]*ta;

  const cv = document.getElementById('cloudCanvas');
  const W = cv.width, H = cv.height;
  const ctx = cv.getContext('2d');
  if(!renderClouds._img) renderClouds._img = ctx.createImageData(W,H);
  const img = renderClouds._img;
  const mTop = merc(CG.lat1), mBot = merc(CG.lat0);
  // tekstuuri ajelehtii hitaasti ajan mukana, jotta kelaus tuntuu liikkeelta
  const offX = (Math.round(state.hour*7)) & (NOISE.S-1);
  const offY = (Math.round(state.hour*3)) & (NOISE.S-1);

  for(let y=0;y<H;y++){
    const lat = imerc(mTop + (y/(H-1))*(mBot-mTop));
    let fr = (lat - CG.lat0)/CG.dlat;
    fr = clamp(fr, 0, g.nlat-1.0001);
    const r0 = Math.floor(fr), rf = ss(fr - r0);
    const ny = ((y+offY)&(NOISE.S-1))*NOISE.S;
    for(let x=0;x<W;x++){
      const lon = CG.lon0 + (x/(W-1))*(CG.lon1-CG.lon0);
      let fc = (lon - CG.lon0)/CG.dlon;
      fc = clamp(fc, 0, g.nlon-1.0001);
      const c0 = Math.floor(fc), cf = ss(fc - c0);
      const i00 = r0*g.nlon + c0;
      const v = B[i00]*(1-rf)*(1-cf) + B[i00+1]*(1-rf)*cf
              + B[i00+g.nlon]*rf*(1-cf) + B[i00+g.nlon+1]*rf*cf;

      // fraktaalitekstuuri: voimakkain puolipilvisessa, nolla selkealla ja umpipilvella
      const nz  = NOISE.n[ny + ((x+offX)&(NOISE.S-1))];
      const vt  = clamp(v + nz * v*(1-v)*4 * 0.9, 0, 1);

      const k = (y*W+x)*4;
      const fade = clamp(Math.min(x, W-1-x, y, H-1-y)/18, 0, 1);
      const cva  = clamp((vt-0.12)/0.72, 0, 1);
      // paksuus nakyy valoisuutena: ohut huntu harmaa, umpipilvi kirkas
      const bright = 148 + vt*92;
      img.data[k]   = Math.round(bright*0.96);
      img.data[k+1] = Math.round(bright);
      img.data[k+2] = Math.min(255, Math.round(bright*1.07));
      img.data[k+3] = Math.round(Math.pow(cva,1.05)*205*fade);
    }
  }
  ctx.putImageData(img,0,0);

  const coords = [[CG.lon0,CG.lat1],[CG.lon1,CG.lat1],[CG.lon1,CG.lat0],[CG.lon0,CG.lat0]];
  const dataUrl = cv.toDataURL();  // PNG: säilyttää läpinäkyvyyden
  if(!map.getSource('clouds')){
    map.addSource('clouds',{type:'image',url:dataUrl,coordinates:coords});
    map.addLayer({id:'clouds',type:'raster',source:'clouds',
                  paint:{'raster-opacity':0.9,'raster-resampling':'linear'}});
    if(map.getLayer('ovation')) map.moveLayer('clouds','ovation');
    map.setLayoutProperty('clouds','visibility', state.cloudsOn?'visible':'none');
    const onSrcData = e => {
      if(e.sourceId==='clouds' && e.isSourceLoaded){ map.off('sourcedata',onSrcData); map.triggerRepaint(); }
    };
    map.on('sourcedata', onSrcData);
  } else {
    map.getSource('clouds').updateImage({url:dataUrl,coordinates:coords});
  }
}

/* ── astronomia: auringon korkeus ────────────────────────────── */
function sunAltitude(date, lat, lon){
  const rad=Math.PI/180;
  const d = (date/86400000) - 10957.5;           // days since J2000
  const g = rad*(357.529 + 0.98560028*d);        // mean anomaly
  const q = 280.459 + 0.98564736*d;              // mean longitude
  const L = rad*(q + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)); // ecliptic lon
  const e = rad*(23.439 - 0.00000036*d);         // obliquity
  const RA = Math.atan2(Math.cos(e)*Math.sin(L), Math.cos(L));
  const dec = Math.asin(Math.sin(e)*Math.sin(L));
  const GMST = (18.697374558 + 24.06570982441908*d) % 24;
  const LST = rad*((GMST*15 + lon) % 360);
  const H = LST - RA;                            // hour angle
  const alt = Math.asin(Math.sin(rad*lat)*Math.sin(dec)
            + Math.cos(rad*lat)*Math.cos(dec)*Math.cos(H));
  return alt/rad;                                // degrees
}

/* ── geomagneettinen leveysaste (dipoliapproksimaatio) ───────── */
function magLat(lat,lon){
  const rad=Math.PI/180;
  const latP=80.7*rad, lonP=-72.7*rad;
  const la=lat*rad, lo=lon*rad;
  return Math.asin(Math.sin(la)*Math.sin(latP)
       + Math.cos(la)*Math.cos(latP)*Math.cos(lo-lonP))/rad;
}

/* Kp:stä johdettu revontuliarvio tulevaisuuden tunneille.
   Ovaalin ekvaattorinpuoleinen raja (geomagneettinen lat) ~ Kp:
   Kp0≈66.5° … Kp9≈48°, n. -2°/Kp. Karkea arvio, merkitään arvioksi. */
function auroraEstimateFromKp(kp, mlat){
  const boundary = 66.5 - 2.05*kp;
  return clamp(45 + (mlat - boundary)*12, 0, 90);
}

function kpAt(date){
  if(!state.kpForecast.length) return Number.isFinite(state.kpNow) ? state.kpNow : 2;
  let best = state.kpForecast[0];
  for(const f of state.kpForecast){
    if(Math.abs(f.t-date) < Math.abs(best.t-date)) best=f;
  }
  return best.kp;
}

/* ── indeksin laskenta ───────────────────────────────────────── */
function cloudFactorAt(date){
  if(!state.clouds) return null;
  const ts = state.clouds.times;
  let i = ts.findIndex(t=>t>=date);
  if(i<0) i = ts.length-1;
  if(i>0 && date-ts[i-1] < ts[i]-date) i--;
  const low  = (state.clouds.low[i]  ?? state.clouds.total[i] ?? 0)/100;
  const mid  = (state.clouds.mid[i]  ?? 0)/100;
  const high = (state.clouds.high[i] ?? 0)/100;
  // alapilvet peittävät lähes täysin, yläpilvien läpi näkee osin
  const block = clamp(0.95*low + 0.65*mid + 0.30*high, 0, 1);
  return 1-block;
}

function darknessFactor(altDeg){
  // aurinko yli -6° → liian valoisaa; alle -12° → täysi pimeys
  if(altDeg >= -6) return 0;
  if(altDeg <= -12) return 1;
  return (-6 - altDeg)/6;
}

function auroraProbAt(lat,lon,date,hourOffset){
  if(hourOffset===0 && state.ovation){
    const li = clamp(Math.round(lat+90),0,180);
    const lo = Math.round((lon+360)%360)%360;
    // OVATION antaa todennäköisyyden suoraan pisteeseen
    let p = state.ovation.grid[li*360+lo] || 0;
    // katso myös hieman pohjoisemmaksi: ovaali voi näkyä horisontissa
    const li2 = clamp(li+3,0,180);
    p = Math.max(p, (state.ovation.grid[li2*360+lo]||0)*0.6);
    return {p, est:false};
  }
  return {p: auroraEstimateFromKp(kpAt(date), magLat(lat,lon)), est:true};
}

function update(){
  // Aikaleima päivittyy aina, myös ennen pisteen valintaa
  const date = new Date(Date.now() + state.hour*3600e3);
  const hr = Math.round(state.hour);
  if(hr===0){ $('timeLbl').textContent='Nyt'; }
  else{ $('timeLbl').textContent = '+'+hr+' h · '
    + date.toLocaleString('fi-FI',{weekday:'short',hour:'2-digit',minute:'2-digit'}); }

  if(!state.point) return;
  const {lat,lon} = state.point;

  const a = auroraProbAt(lat,lon,date,state.hour);
  if(!Number.isFinite(a.p)) a.p = 0;
  const cf = cloudFactorAt(date);
  const df = darknessFactor(sunAltitude(date,lat,lon));

  const cloudPct = cf==null ? null : Math.round(cf*100);
  const idx = Math.round((a.p/100) * (cf==null?1:cf) * df * 100);

  // gauge
  const C = 2*Math.PI*52;
  $('gaugeVal').style.strokeDashoffset = C*(1-idx/100);
  $('gaugeVal').style.stroke = idx>=50 ? 'var(--aurora)' : idx>=20 ? 'var(--cloud)' : 'var(--line)';
  $('idxNum').textContent = idx+'%';

  // chips
  $('fAurora').textContent = Math.round(a.p)+'%' + (a.est?' *':'');
  $('bAurora').style.width = a.p+'%';
  $('fCloud').textContent = cloudPct==null?'–':cloudPct+'%';
  $('bCloud').style.width = (cloudPct??0)+'%';
  $('fDark').textContent = Math.round(df*100)+'%';
  $('bDark').style.width = df*100+'%';

  // verdict
  let t,x;
  if(df===0){ t='Liian valoisaa'; x='Aurinko on liian korkealla — revontulet eivät erotu taivaalta tähän aikaan.'; }
  else if(idx>=60){ t='Hyvät mahdollisuudet'; x='Revontuliaktiivisuus riittää ja taivas on riittävän selkeä. Kannattaa katsoa pohjoiselle taivaalle.'; }
  else if(idx>=30){ t='Kohtalaiset mahdollisuudet'; x='Näkyminen on mahdollista, mutta joko aktiivisuus tai sää rajoittaa. Seuraa tilannetta.'; }
  else if(a.p>=30 && cloudPct!=null && cloudPct<40){ t='Pilvet peittävät'; x='Aktiivisuutta olisi, mutta pilvikansi estää näkymän tästä pisteestä.'; }
  else { t='Heikot mahdollisuudet'; x='Revontuliaktiivisuus on tällä hetkellä vähäistä tällä leveysasteella.'; }
  $('verdictTitle').textContent = t;
  $('verdictText').textContent = x;

  // notes
  if(a.est){
    note('* Tulevien tuntien revontuliarvo on karkea arvio Kp-ennusteesta. Tarkka ovaaliennuste (NOAA) kattaa vain nykyhetken.');
  } else if(df===0 && sunAltitude(new Date(date.getTime()+12*3600e3),lat,lon) > -6){
    note('Kesäyö on tällä leveysasteella liian valoisa revontulille — kausi alkaa taas elo–syyskuussa.');
  } else note('');
}

function note(msg, isErr){
  const n = $('noteMsg');
  n.textContent = msg;
  n.className = 'note' + (msg?' show':'') + (isErr?' err':'');
}

    + label + ' · ' + lat.toFixed(2) + '°N, ' + lon.toFixed(2) + '°E';

}

/* ── service worker + päivitysilmoitus ───────────────────────── */
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    const offer = w => { if(w) $('updatePill').classList.add('show'),
      $('updatePill').onclick = ()=> w.postMessage('SKIP_WAITING'); };
    if(reg.waiting && navigator.serviceWorker.controller) offer(reg.waiting);
    reg.addEventListener('updatefound', ()=>{
      const w = reg.installing;
      w && w.addEventListener('statechange', ()=>{
        if(w.state==='installed' && navigator.serviceWorker.controller) offer(reg.waiting || w);
      });
    });
    setInterval(()=>reg.update().catch(()=>{}), 30*60*1000);
  }).catch(()=>{});
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(!reloaded){ reloaded = true; location.reload(); }
  });
}
</script>
</body>
</html>
